workflows:
  ios-unsigned:
    name: Festival Companion iOS

    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: frontend/mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      vars:
        API_BASE_URL: "http://192.168.178.176:8000/api"
        WIDGET_API_URL: "http://192.168.178.176:8000/api/widgets/schedule/"
        WIDGET_API_TOKEN: "DdQ29_jT8RMzzkpe3psAqbUiwx0i6OlA63PeSgCvo6esEiiVU0fGrreXiKL1Lfcr"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $CM_BUILD_DIR/frontend/mobile/.dart_tool
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Check build tools
        script: |
          flutter --version
          xcodebuild -version
          ruby --version
          gem --version

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Build unsigned release iOS app
        script: |
          echo "Building Flutter app"
          echo "API_BASE_URL=$API_BASE_URL"
          echo "WIDGET_API_URL=$WIDGET_API_URL"

          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Verify widget
          script: |
            echo "===== Embedded widgets ====="

            find \
              build/ios/iphoneos/Runner.app \
              -name "*.appex"

            echo ""

            plutil -p \
              build/ios/iphoneos/Runner.app/PlugIns/NextSetWidget.appex/Info.plist

      - name: Package unsigned release IPA
        script: |
          IPA_PATH="build/ios/FestivalCompanion-unsigned.ipa"
          PAYLOAD_PATH="build/ios/ipa_payload/Payload"

          rm -rf \
            build/ios/ipa_payload

          rm -f \
            "$IPA_PATH"

          mkdir -p \
            "$PAYLOAD_PATH"

          cp -R \
            build/ios/iphoneos/Runner.app \
            "$PAYLOAD_PATH/Runner.app"

          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "$PAYLOAD_PATH" \
            "$IPA_PATH"

          echo "===== Created IPA ====="

          ls -lh \
            "$IPA_PATH"

          echo ""
          echo "===== Embedded extensions inside IPA ====="

          unzip -l "$IPA_PATH" |
            grep -E \
              "Payload/Runner\.app/PlugIns/NextSetWidget\.appex" ||
            true

          echo ""
          echo "===== Initial IPA contents ====="

          unzip -l "$IPA_PATH" |
            head -50

    artifacts:
      - build/ios/FestivalCompanion-unsigned.ipa
      - build/ios/iphoneos/Runner.app