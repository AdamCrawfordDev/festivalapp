workflows:
  ios-simulator-build:
    name: iOS Simulator Build

    instance_type: mac_mini_m2

    max_build_duration: 60

    working_directory: frontend/mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Check Flutter environment
        script: |
          flutter --version
          flutter doctor -v

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Run Dart analysis
        script: |
          flutter analyze

      - name: Run Flutter tests
        script: |
          flutter test

      - name: Install iOS pods
        script: |
          cd ios
          pod install

      - name: Build unsigned iOS simulator app
        script: |
          flutter build ios \
            --simulator \
            --debug \
            --no-codesign

    artifacts:
      - build/ios/iphonesimulator/*.app
      - flutter_drive.log
