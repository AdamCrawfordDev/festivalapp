
workflows:
  ios-unsigned:
    name: Festival Companion iOS

    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: frontend/mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      vars:
        API_BASE_URL: "http://192.168.178.176:8000/api"
        WIDGET_API_URL: "http://192.168.178.176:8000/api/widgets/schedule/"
        WIDGET_API_TOKEN: "DdQ29_jT8RMzzkpe3psAqbUiwx0i6OlA63PeSgCvo6esEiiVU0fGrreXiKL1Lfcr"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $CM_BUILD_DIR/frontend/mobile/.dart_tool
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Check build tools
        script: |
          flutter --version
          xcodebuild -version
          ruby --version
          gem --version

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Show Xcode targets
        script: |
          echo "===== Xcode targets ====="

          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -list

      - name: Build unsigned release iOS app
        script: |
          echo "Building Flutter app"
          echo "API_BASE_URL=$API_BASE_URL"
          echo "WIDGET_API_URL=$WIDGET_API_URL"

          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Verify widget
        script: |
          set -euo pipefail

          PLUGINS_PATH="build/ios/iphoneos/Runner.app/PlugIns"

          echo "===== Embedded widgets ====="

          find \
            "$PLUGINS_PATH" \
            -maxdepth 1 \
            -type d \
            -name "*.appex" \
            -print

          WIDGET_PATH="$(
            find \
              "$PLUGINS_PATH" \
              -maxdepth 1 \
              -type d \
              -name "*.appex" \
              -print \
              -quit
          )"

          if [ -z "$WIDGET_PATH" ]; then
            echo "No widget extension was embedded."
            exit 1
          fi

          echo ""
          echo "===== Widget path ====="
          echo "$WIDGET_PATH"

          INFO_PLIST="$WIDGET_PATH/Info.plist"

          test -f "$INFO_PLIST"

          echo ""
          echo "===== Widget Info.plist ====="

          plutil -p "$INFO_PLIST"

          EXTENSION_POINT="$(
            /usr/libexec/PlistBuddy \
              -c "Print :NSExtension:NSExtensionPointIdentifier" \
              "$INFO_PLIST"
          )"

          if [ "$EXTENSION_POINT" != "com.apple.widgetkit-extension" ]; then
            echo "Unexpected extension point: $EXTENSION_POINT"
            exit 1
          fi

          WIDGET_EXECUTABLE="$(
            /usr/libexec/PlistBuddy \
              -c "Print :CFBundleExecutable" \
              "$INFO_PLIST"
          )"

          echo ""
          echo "===== Widget executable ====="
          echo "$WIDGET_EXECUTABLE"

          test -n "$WIDGET_EXECUTABLE"
          test -f "$WIDGET_PATH/$WIDGET_EXECUTABLE"

          file "$WIDGET_PATH/$WIDGET_EXECUTABLE"

          echo ""
          echo "Widget extension was built and embedded successfully."

      - name: Package unsigned release IPA
        script: |
          set -euo pipefail

          IPA_PATH="build/ios/FestivalCompanion-unsigned.ipa"
          PAYLOAD_ROOT="build/ios/ipa_payload"
          PAYLOAD_PATH="$PAYLOAD_ROOT/Payload"

          rm -rf "$PAYLOAD_ROOT"
          rm -f "$IPA_PATH"

          mkdir -p "$PAYLOAD_PATH"

          cp -R \
            build/ios/iphoneos/Runner.app \
            "$PAYLOAD_PATH/Runner.app"

          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "$PAYLOAD_PATH" \
            "$IPA_PATH"

          echo "===== Created IPA ====="

          ls -lh "$IPA_PATH"

          echo ""
          echo "===== Widget files inside IPA ====="

          unzip -l "$IPA_PATH" |
            grep -E \
              "Payload/Runner\.app/PlugIns/.+\.appex"

          echo ""
          echo "===== Initial IPA contents ====="

          unzip -l "$IPA_PATH" |
            head -50

    artifacts:
      - build/ios/FestivalCompanion-unsigned.ipa
      - build/ios/iphoneos/Runner.app

