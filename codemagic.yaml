workflows:
  ios-unsigned:
    name: Festival Companion iOS

    instance_type: mac_mini_m2
    max_build_duration: 60

    working_directory: frontend/mobile

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      vars:
        API_BASE_URL: "http://192.168.178.176:8000/api"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $CM_BUILD_DIR/frontend/mobile/.dart_tool
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Check Flutter installation
        script: |
          flutter --version
          xcodebuild -version

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Build unsigned release iOS app
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Package unsigned release IPA
        script: |
          rm -rf build/ios/ipa_payload
          mkdir -p build/ios/ipa_payload/Payload

          cp -R \
            build/ios/iphoneos/Runner.app \
            build/ios/ipa_payload/Payload/Runner.app

          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            build/ios/ipa_payload/Payload \
            build/ios/FestivalCompanion-unsigned.ipa

          echo "Created IPA:"
          ls -lh build/ios/FestivalCompanion-unsigned.ipa

          echo "IPA contents:"
          unzip -l build/ios/FestivalCompanion-unsigned.ipa | head -30

    artifacts:
      - build/ios/FestivalCompanion-unsigned.ipa
      - build/ios/iphoneos/Runner.app